name: SX1280 FLRC build

on:
  pull_request:
  workflow_dispatch:

jobs:
  firmware:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [tx, rx]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install platformio
      - run: pio run -e ${{ matrix.environment }}

  host-and-protocol:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m py_compile host/pc_audio_sender.py
      - run: g++ -std=c++17 -Wall -Wextra -Werror -Iinclude tests/protocol_test.cpp -o /tmp/pr1_protocol_test
      - run: /tmp/pr1_protocol_test
