[platformio]
default_envs = safe
boards_dir = boards

[env]
platform = espressif32@6.5.0
board = esp32s3_flash_4MB
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_upload.flash_size = 4MB
board_build.arduino.memory_type = qio_qspi
lib_deps =
    jgromes/RadioLib@7.7.1
build_flags =
    -Wall
    -Wextra
    -DCORE_DEBUG_LEVEL=2
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_RUNNING_CORE=1
    -DARDUINO_EVENT_RUNNING_CORE=1
    -I../common

; Safe environment: builds/flashes without initializing or transmitting on RF.
[env:safe]
build_flags =
    ${env.build_flags}
    -DPR1_ENABLE_RF_TEST=0

; Intentionally no ready-to-run TX environment is provided.
; After the exact legal/approved bench-test configuration is known, create a
; local environment with PR1_ENABLE_RF_TEST=1 plus explicit frequency, power,
; and node role. See README.md in this directory.
